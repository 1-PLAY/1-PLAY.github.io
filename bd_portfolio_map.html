
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.filter-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary)}
.chart-area{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1rem 1rem 0;position:relative}
.legend{display:flex;gap:20px;margin-bottom:1rem;padding-left:56px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
.add-btn{font-size:12px;padding:4px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;margin-left:auto}
.add-form{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:1rem;display:none;flex-wrap:wrap;gap:10px;align-items:flex-end}
.add-form label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px}
.add-form input,.add-form select{font-size:12px;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.field{min-width:110px;flex:1}
.form-actions{display:flex;gap:6px;padding-top:16px}
.summary-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.deals-list{margin-top:1rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;display:none}
.deals-list-header{display:grid;grid-template-columns:1fr 80px 100px 140px 64px;gap:8px;padding:8px 12px;background:var(--color-background-secondary);font-size:11px;font-weight:500;color:var(--color-text-tertiary)}
.deal-row{display:grid;grid-template-columns:1fr 80px 100px 140px 64px;gap:8px;padding:8px 12px;font-size:12px;color:var(--color-text-primary);border-top:0.5px solid var(--color-border-tertiary);align-items:center}
.deal-row:hover{background:var(--color-background-secondary)}
.deal-actions{display:flex;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:var(--color-text-secondary)}
.icon-btn:hover{background:var(--color-background-tertiary);color:var(--color-text-primary)}
.tooltip{position:absolute;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:var(--color-text-primary);pointer-events:none;display:none;z-index:10;min-width:160px;line-height:1.6}
.tooltip strong{font-weight:500;display:block;margin-bottom:2px}
.toggle-list-btn{font-size:12px;color:var(--color-text-tertiary);background:none;border:none;cursor:pointer;padding:4px 0;margin-top:8px;display:none}
</style>

<div class="wrap">
<h2 class="sr-only">BD portfolio map — Sales Cycle stage vs Size of Customer</h2>

<div class="controls">
  <span style="font-size:12px;color:var(--color-text-tertiary);margin-right:4px">Filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Religion">Religion</button>
  <button class="filter-btn" data-filter="Education">Education</button>
  <button class="filter-btn" data-filter="Sports">Sports</button>
  <button class="add-btn" id="toggleAdd">+ Add deal</button>
</div>

<div class="add-form" id="addForm">
  <div class="field"><label id="formLabel">Organisation</label><input id="fName" placeholder="e.g. Rugby India"></div>
  <div class="field"><label>Vertical</label><select id="fVertical"><option>Religion</option><option>Education</option><option>Sports</option></select></div>
  <div class="field"><label>Deal size</label><select id="fSize"><option>&lt;$50K</option><option>$50–100K</option><option>$100–250K</option><option>&gt;$250K</option></select></div>
  <div class="field"><label>Stage</label><select id="fStage"><option>10% — Scouting</option><option>30% — Qualifying</option><option>50% — Proposing</option><option>80% — Negotiating</option><option>100% — Closed</option></select></div>
  <div class="form-actions">
    <button class="filter-btn active" id="submitDeal">Add</button>
    <button class="filter-btn" id="cancelAdd">Cancel</button>
  </div>
</div>

<div class="chart-area">
  <div class="legend">
    <div class="legend-item"><svg width="14" height="14"><rect x="1" y="1" width="12" height="12" fill="none" stroke="#888780" stroke-width="1.5"/></svg>Religion</div>
    <div class="legend-item"><svg width="14" height="14"><polygon points="7,1 13,13 1,13" fill="none" stroke="#888780" stroke-width="1.5"/></svg>Education</div>
    <div class="legend-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="none" stroke="#888780" stroke-width="1.5"/></svg>Sports</div>
  </div>
  <div style="position:relative;height:360px">
    <canvas id="bdChart" role="img" aria-label="BD portfolio map">BD portfolio map.</canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<div class="summary-row" id="summary"></div>
<button class="toggle-list-btn" id="toggleList">Show all deals</button>

<div class="deals-list" id="dealsList">
  <div class="deals-list-header">
    <span>Organisation</span><span>Vertical</span><span>Deal size</span><span>Stage</span><span></span>
  </div>
  <div id="dealsBody"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STAGES = ['10% — Scouting','30% — Qualifying','50% — Proposing','80% — Negotiating','100% — Closed'];
const SIZES  = ['<$50K','$50–100K','$100–250K','>$250K'];

let deals = [];
let activeFilter = 'all';
let editIndex = -1;

function xPos(s){ return SIZES.indexOf(s); }
function yPos(s){ return STAGES.indexOf(s); }

function getPositions(filtered){
  const counts = {};
  return filtered.map(d => {
    const key = d.size+'|'+d.stage;
    const idx = counts[key] = (counts[key]||0);
    counts[key]++;
    const offsets = [0,-1,1,-2,2];
    return {
      x: xPos(d.size) + offsets[idx % offsets.length]*0.13,
      y: yPos(d.stage) + Math.floor(idx/5)*0.13
    };
  });
}

function drawShape(ctx, type, x, y, sz){
  ctx.beginPath();
  if(type==='Religion'){ ctx.rect(x-sz/2,y-sz/2,sz,sz); }
  else if(type==='Education'){ ctx.moveTo(x,y-sz*0.62); ctx.lineTo(x+sz*0.58,y+sz*0.42); ctx.lineTo(x-sz*0.58,y+sz*0.42); ctx.closePath(); }
  else { ctx.arc(x,y,sz*0.5,0,Math.PI*2); }
}

const plugin = {
  id:'shapes',
  afterDatasetsDraw(chart){
    const {ctx,scales:{x,y}} = chart;
    const filtered = activeFilter==='all' ? deals : deals.filter(d=>d.vertical===activeFilter);
    const pos = getPositions(filtered);
    filtered.forEach((d,i)=>{
      const px = x.getPixelForValue(pos[i].x);
      const py = y.getPixelForValue(pos[i].y);
      ctx.save();
      ctx.fillStyle='rgba(95,94,90,0.12)';
      ctx.strokeStyle='#5F5E5A';
      ctx.lineWidth=1.8;
      drawShape(ctx,d.vertical,px,py,22);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    });
  }
};

const chart = new Chart(document.getElementById('bdChart'),{
  type:'scatter',
  data:{datasets:[{data:[],pointRadius:0}]},
  options:{
    responsive:true, maintainAspectRatio:false, animation:false,
    scales:{
      x:{type:'linear',min:-0.65,max:3.65,
        ticks:{stepSize:1,callback:v=>SIZES[Math.round(v)]||'',color:'#888780',font:{size:11},maxRotation:0},
        grid:{color:'rgba(180,178,169,0.2)'},
        title:{display:true,text:'Size of customer',color:'#888780',font:{size:11}}},
      y:{type:'linear',min:-0.65,max:4.65,
        ticks:{stepSize:1,callback:v=>STAGES[Math.round(v)]||'',color:'#888780',font:{size:11}},
        grid:{color:'rgba(180,178,169,0.2)'},
        title:{display:true,text:'Sales cycle stage',color:'#888780',font:{size:11}}}
    },
    plugins:{legend:{display:false},tooltip:{enabled:false}}
  },
  plugins:[plugin]
});

function refresh(){ chart.update(); renderSummary(); renderList(); }

function renderSummary(){
  const f = activeFilter==='all' ? deals : deals.filter(d=>d.vertical===activeFilter);
  const v={Religion:0,Education:0,Sports:0};
  f.forEach(d=>v[d.vertical]++);
  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="stat-label">Total deals</div><div class="stat-val">${f.length}</div></div>
    <div class="stat"><div class="stat-label">Religion</div><div class="stat-val">${v.Religion}</div></div>
    <div class="stat"><div class="stat-label">Education</div><div class="stat-val">${v.Education}</div></div>
    <div class="stat"><div class="stat-label">Sports</div><div class="stat-val">${v.Sports}</div></div>`;
  const tl = document.getElementById('toggleList');
  tl.style.display = deals.length ? 'block' : 'none';
}

function renderList(){
  const body = document.getElementById('dealsBody');
  if(!deals.length){ body.innerHTML=''; return; }
  body.innerHTML = deals.map((d,i)=>`
    <div class="deal-row">
      <span>${d.name}</span>
      <span>${d.vertical}</span>
      <span>${d.size}</span>
      <span>${d.stage}</span>
      <div class="deal-actions">
        <button class="icon-btn" onclick="editDeal(${i})" title="Edit">✎</button>
        <button class="icon-btn" onclick="deleteDeal(${i})" title="Delete">✕</button>
      </div>
    </div>`).join('');
}

window.deleteDeal = function(i){ deals.splice(i,1); refresh(); };

window.editDeal = function(i){
  editIndex = i;
  const d = deals[i];
  document.getElementById('fName').value = d.name;
  document.getElementById('fVertical').value = d.vertical;
  document.getElementById('fSize').value = d.size;
  document.getElementById('fStage').value = d.stage;
  document.getElementById('submitDeal').textContent = 'Save';
  document.getElementById('addForm').style.display = 'flex';
  document.getElementById('fName').focus();
};

renderSummary();

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeFilter=btn.dataset.filter;
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    refresh();
  });
});

const tooltip = document.getElementById('tooltip');
document.getElementById('bdChart').addEventListener('mousemove',e=>{
  const canvas=document.getElementById('bdChart');
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const {scales:{x,y}}=chart;
  const filtered=activeFilter==='all'?deals:deals.filter(d=>d.vertical===activeFilter);
  const pos=getPositions(filtered);
  let found=null;
  filtered.forEach((d,i)=>{
    const px=x.getPixelForValue(pos[i].x), py=y.getPixelForValue(pos[i].y);
    if(Math.abs(mx-px)<14&&Math.abs(my-py)<14) found=d;
  });
  if(found){
    tooltip.style.display='block';
    tooltip.style.left=(mx+14)+'px';
    tooltip.style.top=(my-10)+'px';
    tooltip.innerHTML=`<strong>${found.name}</strong>${found.vertical} &nbsp;·&nbsp; ${found.size}<br>${found.stage}`;
  } else { tooltip.style.display='none'; }
});
document.getElementById('bdChart').addEventListener('mouseleave',()=>tooltip.style.display='none');

document.getElementById('toggleAdd').addEventListener('click',()=>{
  editIndex=-1;
  document.getElementById('fName').value='';
  document.getElementById('fVertical').selectedIndex=0;
  document.getElementById('fSize').selectedIndex=0;
  document.getElementById('fStage').selectedIndex=0;
  document.getElementById('submitDeal').textContent='Add';
  const form=document.getElementById('addForm');
  form.style.display=form.style.display==='flex'?'none':'flex';
  if(form.style.display==='flex') document.getElementById('fName').focus();
});

document.getElementById('cancelAdd').addEventListener('click',()=>{
  document.getElementById('addForm').style.display='none';
  editIndex=-1;
});

document.getElementById('submitDeal').addEventListener('click',()=>{
  const name=document.getElementById('fName').value.trim();
  if(!name){ document.getElementById('fName').focus(); return; }
  const deal={
    name,
    vertical:document.getElementById('fVertical').value,
    size:document.getElementById('fSize').value,
    stage:document.getElementById('fStage').value,
  };
  if(editIndex>=0){ deals[editIndex]=deal; editIndex=-1; }
  else { deals.push(deal); }
  document.getElementById('addForm').style.display='none';
  document.getElementById('submitDeal').textContent='Add';
  refresh();
});

document.getElementById('fName').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('submitDeal').click();
});

document.getElementById('toggleList').addEventListener('click',()=>{
  const list=document.getElementById('dealsList');
  const btn=document.getElementById('toggleList');
  const open=list.style.display==='block';
  list.style.display=open?'none':'block';
  btn.textContent=open?'Show all deals':'Hide deals';
});
</script>
